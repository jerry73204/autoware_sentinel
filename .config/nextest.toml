# nextest configuration for Autoware Sentinel
# See: https://nexte.st/book/configuration.html

[profile.default]
# Mark tests as slow after 30 seconds, terminate after 60 seconds
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = false

[profile.default.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true

# Transport smoke tests: heavyweight (zenohd + sentinel + ROS 2 CLI),
# run sequentially to avoid port/resource contention.
[test-groups.transport-smoke]
max-threads = 1

[[profile.default.overrides]]
filter = "binary(transport_smoke)"
test-group = "transport-smoke"
slow-timeout = { period = "60s", terminate-after = 2 }

# Planning simulator tests: very heavyweight (Autoware + sentinel + ROS 2),
# run sequentially with longer timeouts.
[test-groups.planning-simulator]
max-threads = 1

[[profile.default.overrides]]
filter = "binary(planning_simulator)"
test-group = "planning-simulator"
slow-timeout = { period = "120s", terminate-after = 2 }

# Controller node tests: heavyweight (zenohd + sentinel + multiple ROS 2 pubs),
# run sequentially to avoid resource contention.
[test-groups.controller-node]
max-threads = 1

[[profile.default.overrides]]
filter = "binary(controller_node)"
test-group = "controller-node"
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = true
