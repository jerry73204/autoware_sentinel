# Patch message crates to use locally generated versions from sibling packages.
# This crate doesn't generate its own messages — it resolves them transitively
# through autoware_pid_longitudinal_controller and autoware_motion_utils.

[patch.crates-io.autoware_common_msgs]
path = "../autoware_pid_longitudinal_controller/generated/autoware_common_msgs"

[patch.crates-io.autoware_control_msgs]
path = "../autoware_pid_longitudinal_controller/generated/autoware_control_msgs"

[patch.crates-io.autoware_planning_msgs]
path = "../autoware_pid_longitudinal_controller/generated/autoware_planning_msgs"

[patch.crates-io.autoware_vehicle_msgs]
path = "../autoware_pid_longitudinal_controller/generated/autoware_vehicle_msgs"

[patch.crates-io.builtin_interfaces]
path = "../autoware_pid_longitudinal_controller/generated/builtin_interfaces"

[patch.crates-io.geometry_msgs]
path = "../autoware_pid_longitudinal_controller/generated/geometry_msgs"

[patch.crates-io.nav_msgs]
path = "../autoware_pid_longitudinal_controller/generated/nav_msgs"

[patch.crates-io.nros-core]
path = "../../../nano-ros/packages/core/nros-core"

[patch.crates-io.nros-serdes]
path = "../../../nano-ros/packages/core/nros-serdes"

[patch.crates-io.std_msgs]
path = "../autoware_pid_longitudinal_controller/generated/std_msgs"

[patch.crates-io.unique_identifier_msgs]
path = "../autoware_pid_longitudinal_controller/generated/unique_identifier_msgs"
