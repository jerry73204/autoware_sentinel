# Board-specific configuration for native_sim (64-bit)
#
# native_sim uses TAP networking for Zephyr ↔ Host communication.
# See docs/guides/zephyr-setup.md for bridge setup instructions.

CONFIG_NET_LOG=y
CONFIG_NET_STATISTICS=y
CONFIG_NET_SHELL=y

# Debug settings for development
CONFIG_DEBUG=y
CONFIG_DEBUG_INFO=y
